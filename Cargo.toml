[workspace]
resolver = "2"
members = [
    "crates/palette-core",
    "crates/palette-server",
    "crates/palette-tmux",
    "crates/palette-cli",
]

[workspace.package]
edition = "2024"
license = "MIT"

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.8"
reqwest = { version = "0.12", features = ["json"] }
