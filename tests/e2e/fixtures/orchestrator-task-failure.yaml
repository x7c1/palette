task:
  key: orchestrator-task-failure
  children:
    - key: craft-phase
      type: craft
      plan_path: implement
      priority: high
      repository:
        name: x7c1/palette
        branch: e2e-orchestrator
      children:
        - key: automated-checks
          type: orchestrator
          command: "echo 'check failed' >&2; exit 1"
        - key: review
          type: review
          depends_on: [automated-checks]
